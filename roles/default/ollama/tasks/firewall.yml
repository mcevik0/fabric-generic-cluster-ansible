---
# roles/default/ollama/tasks/firewall.yml
# Open firewall port for the Ollama API (Rocky 9 uses firewalld)

- name: Ensure firewalld is running (Rocky 9)
  ansible.builtin.systemd:
    name: firewalld
    state: started
    enabled: true
  when: ansible_os_family == "RedHat"
  tags: ollama, firewall

- name: Allow Ollama API port through firewall (Rocky 9 / firewalld)
  ansible.posix.firewalld:
    port: "{{ ollama_port }}/tcp"
    zone: "{{ ollama_firewall_zone }}"
    permanent: true
    state: enabled
    immediate: true
  when: ansible_os_family == "RedHat"
  tags: ollama, firewall

- name: Allow Ollama API port through firewall (Debian / ufw)
  community.general.ufw:
    rule: allow
    port: "{{ ollama_port }}"
    proto: tcp
  when: ansible_os_family == "Debian"
  tags: ollama, firewall
