---
# roles/default/ollama/tasks/install.yml
# Install Ollama native binary via the official installer script

- name: Install Ollama dependencies (RHEL/Rocky)
  ansible.builtin.dnf:
    name:
      - zstd
      - curl
    state: "{{ ollama_package_state }}"
  when: ansible_os_family == "RedHat"
  tags: ollama, install

- name: Install Ollama dependencies (Ubuntu/Debian)
  ansible.builtin.apt:
    name:
      - zstd
      - curl
    state: "{{ ollama_package_state }}"
    update_cache: true
  when: ansible_os_family == "Debian"
  tags: ollama, install

- name: Check if Ollama is already installed
  ansible.builtin.command:
    cmd: which ollama
  register: ollama_which
  changed_when: false
  failed_when: false
  tags: ollama, install

- name: Download and run Ollama official installer
  ansible.builtin.shell:
    cmd: "curl -fsSL {{ ollama_install_script_url }} | sh"
  when: ollama_which.rc != 0
  tags: ollama, install

- name: Verify Ollama binary is available
  ansible.builtin.command:
    cmd: ollama --version
  register: ollama_version
  changed_when: false
  tags: ollama, install

- name: Display installed Ollama version
  ansible.builtin.debug:
    msg: "Ollama version: {{ ollama_version.stdout }}"
  tags: ollama, install
