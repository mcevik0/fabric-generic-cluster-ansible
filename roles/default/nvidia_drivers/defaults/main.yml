---
# defaults file for nvidia_drivers

# CUDA repository architecture
nvidia_cuda_arch: "x86_64"

# CUDA distro identifier — auto-detected in tasks/main.yml from OS facts.
# Set explicitly to override:
#   Rocky 9  → rhel9
#   Ubuntu 22.04 → ubuntu2204
#   Ubuntu 24.04 → ubuntu2404
nvidia_cuda_distro: ""

# Whether to verify the GPU after installation by running nvidia-smi
nvidia_verify_install: true

# Whether to allow the role to reboot the node after driver installation
# Drivers require a reboot to load the kernel module
nvidia_allow_reboot: true

# How long (seconds) to wait for SSH to come back after reboot
nvidia_reboot_timeout: 360

# Package state: present or latest
nvidia_package_state: present

# nvitop — interactive GPU process viewer installed in an isolated venv
nvidia_install_nvitop: true
nvidia_nvitop_venv: "/opt/nvitop/venv"
nvidia_nvitop_wrapper: "/usr/local/bin/nvitop"
