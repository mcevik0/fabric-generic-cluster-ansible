---
# roles/default/nvidia_drivers/tasks/install_cuda_ubuntu.yml
# Install CUDA toolkit and NVIDIA drivers on Ubuntu 22.04 / 24.04

- name: Install prerequisites for CUDA repository setup
  ansible.builtin.apt:
    name:
      - wget
      - apt-transport-https
      - gnupg
    state: "{{ nvidia_package_state }}"
    update_cache: true
  tags: nvidia, cuda

- name: Download CUDA keyring package
  ansible.builtin.get_url:
    url: "https://developer.download.nvidia.com/compute/cuda/repos/{{ nvidia_cuda_distro }}/{{ nvidia_cuda_arch }}/cuda-keyring_1.1-1_all.deb"
    dest: /tmp/cuda-keyring.deb
    mode: "0644"
  tags: nvidia, cuda

- name: Install CUDA keyring (adds NVIDIA apt repository and GPG key)
  ansible.builtin.apt:
    deb: /tmp/cuda-keyring.deb
    state: present
  tags: nvidia, cuda

- name: Update apt cache after adding CUDA repository
  ansible.builtin.apt:
    update_cache: true
  tags: nvidia, cuda

- name: Install CUDA toolkit
  ansible.builtin.apt:
    name: cuda-toolkit
    state: "{{ nvidia_package_state }}"
  tags: nvidia, cuda

- name: Install nvidia-gds (NVIDIA GPUDirect Storage — pulls in drivers and kernel module)
  ansible.builtin.apt:
    name: nvidia-gds
    state: "{{ nvidia_package_state }}"
  tags: nvidia, drivers
